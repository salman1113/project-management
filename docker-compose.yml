version: "3.8"

services:
  db:
    image: postgres:15
    container_name: project_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: project_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: project_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: