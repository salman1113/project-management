version: "3.8"

services:
  db:
    image: postgres:15
    container_name: project_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: projectdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: project_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/projectdb
      SECRET_KEY: your-super-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: project_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: